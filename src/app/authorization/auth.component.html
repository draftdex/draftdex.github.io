<body>
  <div class="form-container">
    @if (loginForm) {
      <app-login (onRegister)="loginForm = false"></app-login>
    } @else {
      <app-register (onCloseRegisterForm)="loginForm = true;" [availableTeams]="availableTeams"></app-register>
    }
  </div>
  <app-bottom-banner class="login-bottom-banner"></app-bottom-banner>
</body>
